name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.26.3"

      - name: Ensure tag commit is on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if ! git branch -r --contains "$GITHUB_SHA" | sed 's/^[* ]*//' | grep -Fx "origin/${DEFAULT_BRANCH}" >/dev/null; then
            echo "refusing to release tag from a commit outside origin/${DEFAULT_BRANCH}" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

      - name: Integration test
        run: HARNEST_INTEGRATION=1 go test ./cmd/harnest -count=1

      - name: Vet
        run: go vet ./...

      - name: Contract sync check
        run: bash scripts/check-contracts-sync.sh

      - name: Script tests
        run: make script-test

      - name: Smoke build
        run: |
          set -euo pipefail
          go build -o ./harnest-smoke ./cmd/harnest
          ./harnest-smoke help >/dev/null
          rm -f ./harnest-smoke

      - name: Check Homebrew Tap token
        id: homebrew-token
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${HOMEBREW_TAP_GITHUB_TOKEN}" ]]; then
            echo "available=true" >>"$GITHUB_OUTPUT"
          else
            echo "available=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        if: ${{ steps.homebrew-token.outputs.available == 'true' }}
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "v2.15.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Skip GoReleaser without Homebrew Tap token
        if: ${{ steps.homebrew-token.outputs.available != 'true' }}
        run: |
          echo "Skipping GoReleaser because HOMEBREW_TAP_GITHUB_TOKEN is not configured."
