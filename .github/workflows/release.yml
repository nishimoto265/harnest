name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Ensure tag commit is on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if ! git branch -r --contains "$GITHUB_SHA" | sed 's/^[* ]*//' | grep -Fx "origin/${DEFAULT_BRANCH}" >/dev/null; then
            echo "refusing to release tag from a commit outside origin/${DEFAULT_BRANCH}" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Integration test
        run: AUTO_IMPROVE_INTEGRATION=1 go test ./cmd/auto-improve -count=1

      - name: Vet
        run: go vet ./...

      - name: Contract sync check
        run: bash scripts/check-contracts-sync.sh

      - name: Script tests
        run: make script-test

      - name: Smoke build
        run: |
          set -euo pipefail
          go build -o ./harnest-smoke ./cmd/auto-improve
          ./harnest-smoke help >/dev/null
          rm -f ./harnest-smoke

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
