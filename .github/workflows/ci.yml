name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.26.3"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: Integration tests
        run: AUTO_IMPROVE_INTEGRATION=1 go test ./cmd/auto-improve -count=1
      - name: Vet
        run: go vet ./...
      - name: Check contracts sync
        run: bash scripts/check-contracts-sync.sh
      - name: Script tests
        run: make script-test
