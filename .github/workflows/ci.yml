name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race
      - name: Vet
        run: go vet ./...
      - name: Check contracts sync
        run: bash scripts/check-contracts-sync.sh
      - name: Script tests
        run: make script-test
